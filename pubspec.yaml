name: lvs_control
description: "Love Spouse 8154 (wbMSE) BLE Controller — Flutter Native"
publish_to: 'none'
version: 1.4.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # ── BLE ────────────────────────────────────────────────────
  flutter_blue_plus: ^2.2.1
  flutter_ble_peripheral: ^2.1.0

  # ── Permisos en tiempo de ejecución ────────────────────────
  permission_handler: ^12.0.1

  # ── Servicio en segundo plano (Android Foreground Service) ─
  flutter_foreground_task: ^9.2.1

  # ── Acelerómetro (Shake Mode) ──────────────────────────────
  sensors_plus: ^7.0.0
  google_fonts: ^6.2.1

  # ── State management ───────────────────────────────────────
  flutter_riverpod: ^2.5.1
  provider: ^6.1.5

  # ── Multimedia Sync ───────────────────────────────
  just_audio: ^0.9.43
  file_picker: ^8.1.7
  audio_waveforms: ^1.1.0

  # ── Utilidades ─────────────────────────────────────────────
  shared_preferences: ^2.5.4        # Persistir ajustes
  wakelock_plus: ^1.4.0             # Mantener pantalla activa en debug
  cupertino_icons: ^1.0.8
  flame: ^1.36.0
  google_generative_ai: ^0.4.7
  image_picker: ^1.2.1
  flutter_dotenv: ^6.0.0
  http: ^1.2.1
  csv: ^6.0.0
  cached_network_image: ^3.4.1
  mobile_scanner: ^7.0.0      # QR / Barcode scanner real
  supabase_flutter: ^2.12.0

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 21

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/icon/
    - .env
