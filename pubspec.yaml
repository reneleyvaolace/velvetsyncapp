name: lvs_control
description: "Love Spouse 8154 (wbMSE) BLE Controller — Flutter Native"
publish_to: 'none'
version: 1.4.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # ── BLE ────────────────────────────────────────────────────
  flutter_blue_plus: ^2.2.1
  flutter_ble_peripheral: ^2.1.0

  permission_handler: ^12.0.1
  flutter_secure_storage: ^10.0.0  # 🔒 Updated: Latest secure version

  # ── Servicio en segundo plano (Android Foreground Service) ─
  flutter_foreground_task: ^9.2.1

  # ── Acelerómetro (Shake Mode) ──────────────────────────────
  sensors_plus: ^7.0.0
  google_fonts: ^6.2.1

  # ── State management ───────────────────────────────────────
  flutter_riverpod: ^2.6.1  # Updated: Latest stable
  provider: ^6.1.5

  # ── Multimedia Sync ───────────────────────────────
  just_audio: ^0.9.46  # Updated: Bug fixes
  file_picker: ^8.1.7
  audio_waveforms: ^1.1.0

  # ── Deep Linking ──────────────────────────────────
  app_links: ^6.4.0

  wakelock_plus: ^1.4.0
  cupertino_icons: ^1.0.8
  flame: ^1.36.0
  image_picker: ^1.2.1
  http: ^1.2.1
  csv: ^6.0.0
  cached_network_image: ^3.4.1
  mobile_scanner: ^7.0.0      # QR / Barcode scanner real
  supabase_flutter: ^2.12.0
  url_launcher: ^6.3.1
  flutter_dotenv: ^5.2.1  # Updated: Bug fixes
  shared_preferences: ^2.3.3  # Persistencia de configuración
  webview_flutter: ^4.8.0     # WebView para catálogo web (Android/iOS)

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 21

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/
    - assets/icon/
    - assets/icons/
    - assets/images/

